<div class="lock-screen">
  <div class="lock-card fade-up">
    <div class="icon">🔒</div>
    <h1>¡Mariángel, pronto será tu día!</h1>
    <div class="countdown">
      <div class="time-block">
        <span class="number">{{ days | number:'2.0-0' }}</span>
        <span class="label">días</span>
      </div>
      <div class="time-block">
        <span class="number">{{ hours | number:'2.0-0' }}</span>
        <span class="label">horas</span>
      </div>
      <div class="time-block">
        <span class="number">{{ minutes | number:'2.0-0' }}</span>
        <span class="label">minutos</span>
      </div>
      <div class="time-block">
        <span class="number">{{ seconds | number:'2.0-0' }}</span>
        <span class="label">segundos</span>
      </div>
    </div>
    <p class="message">El 28 de mayo podrás abrir tu carta especial con la clave <strong class="text-gold">28</strong>.</p>
    <div class="gold-line"></div>
  </div>
</div>
