<div class="password-screen">
  <div class="password-card fade-up">
    <div class="icon">🎂</div>
    <h2>¡Hoy es 28 de mayo!</h2>
    <p>Para ver tu carta especial, introduce la clave mágica:</p>
    <div class="input-group">
      <input type="password" [(ngModel)]="passwordInput" placeholder="Clave" class="password-input" autofocus>
      <button (click)="verifyPassword()" class="gold-button">Abrir carta</button>
    </div>
    <div *ngIf="error" class="error-message">❌ Clave incorrecta. Intenta de nuevo.</div>
    <div class="hint">Pista: es el día de tu cumpleaños 😉</div>
  </div>
</div>
