<div class="app-container">
  <ng-container *ngIf="currentMode === 'locked'">
    <app-locked [targetDate]="targetDate"></app-locked>
  </ng-container>
  <ng-container *ngIf="currentMode === 'password'">
    <app-password (success)="onPasswordSuccess()"></app-password>
  </ng-container>
  <ng-container *ngIf="currentMode === 'birthday'">
    <app-birthday></app-birthday>
  </ng-container>
</div>
